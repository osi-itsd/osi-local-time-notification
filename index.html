<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Time — OSI IT Service Desk</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230A0E17'/%3E%3Ccircle cx='16' cy='16' r='10.5' fill='none' stroke='%2334D8C6' stroke-width='2'/%3E%3Cpath d='M16 9.5V16l5 3' fill='none' stroke='%2334D8C6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0E17;
    --panel: #121826;
    --panel-border: #232B3D;
    --text: #EDEFF4;
    --muted: #6B7280;
    --accent: #34D8C6;
    --reference: #F2B84B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(52,216,198,0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(242,184,75,0.05), transparent 40%);
    color: var(--text); font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .board {
    width: 100%; max-width: 480px; background: var(--panel);
    border: 1px solid var(--panel-border); border-radius: 12px;
    padding: 36px 32px 28px;
    transition: max-width 0.2s ease;
  }
  .board.wide { max-width: 600px; }

  #events-container.row {
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }
  #events-container.row .event-block {
    flex: 1;
    min-width: 0;
    margin-bottom: 0;
  }
  @media (max-width: 560px) {
    #events-container.row { flex-direction: column; gap: 0; }
    .board.wide { max-width: 480px; }
  }
  .eyebrow {
    display: flex; align-items: center; gap: 8px; font-size: 12px;
    letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase;
    margin-bottom: 24px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 8px var(--accent); flex-shrink: 0;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
    50%      { opacity: 0.5; box-shadow: 0 0 3px var(--accent); }
  }
  @media (prefers-reduced-motion: reduce) { .dot { animation: none; } }

  h1 {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px;
    color: var(--text); margin: 0 0 20px; letter-spacing: -0.01em;
  }

  .event-block { margin-bottom: 26px; }
  .event-block:last-child { margin-bottom: 0; }

  .event-label {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent);
    margin-bottom: 10px;
  }

  .board-row { display: flex; gap: 6px; justify-content: center; margin: 8px 0 6px; }

  .flap {
    position: relative; background: #0D1220; border: 1px solid var(--panel-border);
    border-radius: 4px; width: 40px; height: 56px; display: flex;
    align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace;
    font-weight: 700; font-size: 28px; color: var(--text); overflow: hidden;
  }
  .flap::after {
    content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 1px;
    background: rgba(0,0,0,0.5);
  }
  .flap.colon { width: 14px; background: transparent; border: none; color: var(--muted); font-size: 24px; }
  .flap.colon::after { display: none; }
  .flap .char { animation: flip-in 0.55s cubic-bezier(.4,0,.2,1); }
  @keyframes flip-in {
    0%   { transform: rotateX(90deg); opacity: 0; }
    60%  { transform: rotateX(-8deg); opacity: 1; }
    100% { transform: rotateX(0deg); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) { .flap .char { animation: none; } }

  .meridiem {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--accent);
    letter-spacing: 0.05em; text-align: center; margin-top: 2px;
  }
  .date-line {
    text-align: center; font-family: 'Space Grotesk', sans-serif; font-weight: 500;
    font-size: 15px; color: var(--text); margin-top: 14px;
  }
  .zone-line { text-align: center; font-size: 12.5px; color: var(--muted); margin-top: 3px; }

  .divider { height: 1px; background: var(--panel-border); margin: 22px 0 16px; }

  .ref-table { display: flex; flex-direction: column; gap: 6px; }
  .reference { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .reference .tag {
    min-width: 42px; text-align: center; background: rgba(242,184,75,0.12); color: var(--reference);
    border: 1px solid rgba(242,184,75,0.3); border-radius: 3px; padding: 1px 6px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.03em;
  }
  .reference span:last-child { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text); }

  .state-message { text-align: center; padding: 20px 4px 4px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  .state-message strong { color: var(--text); }
</style>
</head>
<body>

<div class="board">
  <div class="eyebrow"><span class="dot"></span> OSI IT Service Desk</div>
  <h1 id="context-title">Your local time for this notification</h1>

  <div id="events-container"></div>

  <div id="empty-error" style="display:none;" class="state-message"></div>
</div>

<script>
  // ---------------------------------------------------------------------
  // URL parameters (times given in US Pacific, no offset needed):
  //   ?start=2026-07-15T16:00:00              -> single time only
  //   ?start=2026-07-15T16:00:00&end=2026-07-15T18:00:00  -> start + end
  //   ?pst=2026-07-15T16:00:00                 -> legacy alias for start
  // ---------------------------------------------------------------------
  const params = new URLSearchParams(window.location.search);
  const startParam = params.get('start') || params.get('pst');
  const endParam = params.get('end');

  const container = document.getElementById('events-container');
  const emptyError = document.getElementById('empty-error');
  const contextTitle = document.getElementById('context-title');

  function showState(html) {
    container.style.display = 'none';
    emptyError.style.display = 'block';
    emptyError.innerHTML = html;
  }

  function zonedTimeToUtc(dateTimeStr, timeZone) {
    const naive = new Date(dateTimeStr.replace(' ', 'T') + 'Z');
    if (isNaN(naive.getTime())) return null;
    const asIfUTC = new Date(naive.toLocaleString('en-US', { timeZone: 'UTC' }));
    const asIfZoned = new Date(naive.toLocaleString('en-US', { timeZone }));
    const offset = asIfUTC.getTime() - asIfZoned.getTime();
    return new Date(naive.getTime() + offset);
  }

  function formatZone(d, timeZone) {
    const parts = new Intl.DateTimeFormat('en-US', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: false,
      timeZone, timeZoneName: 'short'
    }).formatToParts(d);
    let label = '', dateBits = [], timeBits = [];
    parts.forEach(p => {
      if (p.type === 'timeZoneName') label = p.value;
      else if (['day','month','year'].includes(p.type)) dateBits.push(p.value);
      else if (['hour','minute'].includes(p.type)) timeBits.push(p.value);
    });
    return { label, text: `${dateBits[0]} ${dateBits[1]} ${dateBits[2]}, ${timeBits.join(':')}` };
  }

  function buildEventBlock(d, labelText) {
    const block = document.createElement('div');
    block.className = 'event-block';

    if (labelText) {
      const label = document.createElement('div');
      label.className = 'event-label';
      label.textContent = labelText;
      block.appendChild(label);
    }

    const timeParts = new Intl.DateTimeFormat(undefined, { hour: '2-digit', minute: '2-digit', hour12: true })
      .formatToParts(d);
    let hh = '', mm = '', ampm = '';
    timeParts.forEach(p => {
      if (p.type === 'hour') hh = p.value.padStart(2, '0');
      if (p.type === 'minute') mm = p.value;
      if (p.type === 'dayPeriod') ampm = p.value.toUpperCase();
    });

    const row = document.createElement('div');
    row.className = 'board-row';
    [hh[0], hh[1], ':', mm[0], mm[1]].forEach(ch => {
      const flap = document.createElement('div');
      flap.className = ch === ':' ? 'flap colon' : 'flap';
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch;
      flap.appendChild(span);
      row.appendChild(flap);
    });
    block.appendChild(row);

    const mer = document.createElement('div');
    mer.className = 'meridiem';
    mer.textContent = ampm;
    block.appendChild(mer);

    const dateLine = document.createElement('div');
    dateLine.className = 'date-line';
    dateLine.textContent = new Intl.DateTimeFormat(undefined, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(d);
    block.appendChild(dateLine);

    const zoneName = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const offsetMin = -d.getTimezoneOffset();
    const offsetH = Math.floor(Math.abs(offsetMin) / 60);
    const offsetM = Math.abs(offsetMin) % 60;
    const offsetStr = `UTC${offsetMin >= 0 ? '+' : '-'}${offsetH}${offsetM ? ':' + String(offsetM).padStart(2,'0') : ''}`;
    const zoneLine = document.createElement('div');
    zoneLine.className = 'zone-line';
    zoneLine.textContent = `${zoneName} (${offsetStr})`;
    block.appendChild(zoneLine);

    const divider = document.createElement('div');
    divider.className = 'divider';
    block.appendChild(divider);

    const refTable = document.createElement('div');
    refTable.className = 'ref-table';
    const pt = formatZone(d, 'America/Los_Angeles');
    const uk = formatZone(d, 'Europe/London');
    const ist = formatZone(d, 'Asia/Kolkata');
    refTable.innerHTML = `
      <div class="reference"><span class="tag">${pt.label}</span><span>${pt.text}</span></div>
      <div class="reference"><span class="tag">${uk.label}</span><span>${uk.text}</span></div>
      <div class="reference"><span class="tag">IST</span><span>${ist.text}</span></div>
    `;
    block.appendChild(refTable);

    return block;
  }

  if (!startParam) {
    contextTitle.textContent = 'No time to display';
    showState('This page shows a notification time converted to <strong>your</strong> device\'s timezone. Open it using the link from your outage email — this view has no time attached yet.');
  } else {
    const startDate = zonedTimeToUtc(startParam, 'America/Los_Angeles');
    if (!startDate || isNaN(startDate.getTime())) {
      contextTitle.textContent = 'Link could not be read';
      showState('The time in this link isn\'t in a format this page understands. Please use the link exactly as it appeared in the notification email.');
    } else {
      let endDate = null;
      if (endParam) {
        endDate = zonedTimeToUtc(endParam, 'America/Los_Angeles');
      }

      if (endDate && !isNaN(endDate.getTime())) {
        contextTitle.textContent = 'Your local time for this notification';
        document.querySelector('.board').classList.add('wide');
        container.classList.add('row');
        container.appendChild(buildEventBlock(startDate, 'Start'));
        container.appendChild(buildEventBlock(endDate, 'End'));
      } else {
        contextTitle.textContent = 'Your local time for this notification';
        container.appendChild(buildEventBlock(startDate, null));
      }
    }
  }
</script>

</body>
</html>
